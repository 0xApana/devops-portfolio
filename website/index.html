<!DOCTYPE html>
<html>
  <head>
    <title>My DevOps Portfolio</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #0f0f0f;
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background-color: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 40px;
        max-width: 600px;
        text-align: center;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 10px;
        color: #00d4ff;
      }

      .subtitle {
        color: #aaaaaa;
        margin-bottom: 30px;
        font-size: 1rem;
      }

      .skills {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 30px;
      }

      .badge {
        background-color: #00d4ff20;
        border: 1px solid #00d4ff;
        color: #00d4ff;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 0.85rem;
      }

      .goal {
        color: #ffffff;
        font-size: 1rem;
        line-height: 1.6;
      }

      .goal span {
        color: #00d4ff;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Ridwanullahi Ali Apana</h1>
      <h3> 0xApana <h3>
      <p class="subtitle">Aspiring Cloud & DevOps Engineer</p>

      <div class="skills">
        <span class="badge">Linux</span>
        <span class="badge">Git</span>
        <span class="badge">Docker</span>
        <span class="badge">CI/CD</span>
        <span class="badge">Kubernetes</span>
        <span class="badge">AWS</span>
      </div>

      <p class="goal">
        On a mission to become a <span>Cloud & DevOps Engineer</span>.<br>
        Building real skills, one container at a time.
      </p>
    </div>
  </body>
</html>
